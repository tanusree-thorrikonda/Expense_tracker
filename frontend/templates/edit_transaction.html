{% extends "base.html" %}


{% block title %}

Edit Transaction | Expense Tracker

{% endblock %}



{% block content %}


<div class="form-page">


    <div class="card form-card">


        <div class="card-body p-4">


            <h2 class="fw-bold mb-1">

                Edit Transaction

            </h2>


            <p class="text-muted mb-4">

                Update the transaction information.

            </p>



            <form method="POST">


                <div class="mb-3">

                    <label class="form-label">
                        Title
                    </label>


                    <input type="text" class="form-control" name="title" value="{{ transaction.title }}" required>

                </div>



                <div class="mb-3">

                    <label class="form-label">
                        Amount
                    </label>


                    <input type="number" class="form-control" name="amount" step="0.01" min="0.01"
                        value="{{ transaction.amount }}" required>

                </div>



                <div class="row">


                    <div class="col-md-6 mb-3">


                        <label class="form-label">
                            Category
                        </label>


                        <select class="form-select" name="category" required>


                            {% for category_name in [
                            "Food",
                            "Travel",
                            "Shopping",
                            "Rent",
                            "Bills",
                            "Salary",
                            "Other"
                            ] %}


                            <option value="{{ category_name }}" {% if transaction.category==category_name %} selected {%
                                endif %}>

                                {{ category_name }}

                            </option>


                            {% endfor %}


                        </select>


                    </div>



                    <div class="col-md-6 mb-3">


                        <label class="form-label">
                            Transaction Type
                        </label>


                        <select class="form-select" name="transaction_type" required>


                            <option value="Income" {% if transaction.transaction_type=="Income" %} selected {% endif %}>

                                Income

                            </option>



                            <option value="Expense" {% if transaction.transaction_type=="Expense" %} selected {% endif
                                %}>

                                Expense

                            </option>


                        </select>


                    </div>


                </div>



                <div class="mb-3">


                    <label class="form-label">
                        Date
                    </label>


                    <input type="date" class="form-control" name="date"
                        value="{{ transaction.date.strftime('%Y-%m-%d') }}" required>


                </div>



                <div class="mb-4">


                    <label class="form-label">
                        Description
                    </label>


                    <textarea class="form-control" name="description"
                        rows="4">{{ transaction.description or "" }}</textarea>


                </div>



                <div class="d-flex gap-2">


                    <button type="submit" class="btn btn-primary">

                        Update Transaction

                    </button>



                    <a href="{{ url_for('transaction.dashboard') }}" class="btn btn-outline-secondary">

                        Cancel

                    </a>


                </div>


            </form>


        </div>


    </div>


</div>


{% endblock %}
