{% extends "base.html" %}


{% block title %}

Add Transaction | Expense Tracker

{% endblock %}



{% block content %}


<div class="form-page">


    <div class="card form-card">


        <div class="card-body p-4">


            <h2 class="fw-bold mb-1">

                Add Transaction

            </h2>


            <p class="text-muted mb-4">

                Enter the details of your income or expense.

            </p>



            <form method="POST">


                <div class="mb-3">

                    <label class="form-label">

                        Title

                    </label>


                    <input type="text" class="form-control" name="title" placeholder="Example: Grocery Shopping"
                        required>

                </div>



                <div class="mb-3">

                    <label class="form-label">

                        Amount

                    </label>


                    <input type="number" class="form-control" name="amount" step="0.01" min="0.01" placeholder="0.00"
                        required>

                </div>



                <div class="row">


                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Category

                        </label>


                        <select class="form-select" name="category" required>

                            <option value="">

                                Select Category

                            </option>


                            <option value="Food">Food</option>

                            <option value="Travel">Travel</option>

                            <option value="Shopping">Shopping</option>

                            <option value="Rent">Rent</option>

                            <option value="Bills">Bills</option>

                            <option value="Salary">Salary</option>

                            <option value="Other">Other</option>


                        </select>

                    </div>



                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Transaction Type

                        </label>


                        <select class="form-select" name="transaction_type" required>

                            <option value="">

                                Select Type

                            </option>


                            <option value="Income">

                                Income

                            </option>


                            <option value="Expense">

                                Expense

                            </option>


                        </select>

                    </div>


                </div>



                <div class="mb-3">

                    <label class="form-label">

                        Date

                    </label>


                    <input type="date" class="form-control" name="date" required>

                </div>



                <div class="mb-4">

                    <label class="form-label">

                        Description

                    </label>


                    <textarea class="form-control" name="description" rows="4"
                        placeholder="Optional description"></textarea>


                </div>



                <div class="d-flex gap-2">


                    <button type="submit" class="btn btn-success">

                        Save Transaction

                    </button>



                    <a href="{{ url_for('transaction.dashboard') }}" class="btn btn-outline-secondary">

                        Cancel

                    </a>


                </div>


            </form>


        </div>


    </div>


</div>


{% endblock %}
